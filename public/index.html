<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Votilarus</title>
    <link rel="stylesheet" href="/css/main.css">
    <!-- Chart.js 本地引入 -->
    <script src="/js/utils/chart.umd.min.js"></script>
</head>

<body>
    <!-- 左侧悬浮侧栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-avatar" id="avatar">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="用户头像">
        </div>
        <div class="sidebar-categories" id="categories">
            <!-- 分类列表将通过 JS 动态生成 -->
        </div>
    </aside>

    <!-- 搜索框 -->
    <div class="search-container">
        <div class="search-input-wrapper">
            <!-- 搜索引擎图标（点击展开快捷栏） -->
            <div class="search-engine-icon" id="searchEngineIcon" title="点击选择搜索引擎">
                <!-- 通过 JS 动态生成 -->
            </div>
            <input type="text" class="search-box" id="searchBox" placeholder="输入搜索内容">
        </div>
        <!-- 搜索引擎快捷选择栏 -->
        <div class="search-engine-bar" id="searchEngineBar">
            <!-- 通过 JS 动态生成 -->
        </div>
    </div>

    <!-- 右侧内容区 -->
    <main class="content-area" id="contentArea">
        <!-- 分类面板将通过 JS 动态生成 -->
    </main>

    <!-- 农历库（UMD 格式，需要先加载） -->
    <script src="/js/utils/lunar-script.js"></script>

    <!-- 时间工具类（UMD 格式，需要先加载） -->
    <script src="/js/utils/TimeUtils.js"></script>

    <!-- 主脚本（ES6 模块） -->
    <script src="/js/main.js" type="module"></script>
</body>

</html>
