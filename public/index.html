<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Votilarus</title>
    <link rel="stylesheet" href="/css/main.css">
    <!-- Leaflet.js CSS -->
    <link rel="stylesheet" href="/css/base/leaflet.css" />
    <!-- Chart.js 本地引入 -->
    <script src="/js/utils/chart.umd.min.js"></script>
    <!-- Leaflet.js -->
    <script src="/js/utils/leaflet.js"></script>
</head>

<body>
    <!-- 左侧悬浮侧栏 -->

            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="用户头像">
        </div>
        <div class="sidebar-categories" id="categories">
            <!-- 分类列表将通过 JS 动态生成 -->
        </div>
    </aside>

    <!-- 搜索框 -->
    <search-box id="searchBox" engine="baidu" position="center" box-style="rounded"></search-box>

    <!-- 右侧内容区 -->
    <main class="content-area" id="contentArea">
        <!-- 分类面板将通过 JS 动态生成 -->
    </main>
    <!-- 农历库（UMD 格式，需要先加载） -->
    <script src="/js/utils/lunar-script.js"></script>

    <!-- 时间工具类（UMD 格式，需要先加载） -->
    <script src="/js/utils/TimeUtils.js"></script>

    <!-- 主脚本（ES6 模块） -->
    <script src="/js/main.js" type="module"></script>
</body>
