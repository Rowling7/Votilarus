<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Votilarus History</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 350px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: #f8f9fa;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 18px;
      color: #333;
      margin-bottom: 5px;
    }

    .header p {
      font-size: 12px;
      color: #888;
    }

    .status {
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
      text-align: center;
      font-weight: bold;
      font-size: 13px;
    }

    .status.active {
      background-color: #d4edda;
      color: #155724;
    }

    .status.inactive {
      background-color: #f8d7da;
      color: #721c24;
    }

    .status.info {
      background-color: #d1ecf1;
      color: #0c5460;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 6px;
      background-color: #4a90d9;
      color: white;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      transition: background-color 0.2s;
    }

    .btn:hover {
      background-color: #357abd;
    }

    .btn:disabled {
      background-color: #6c757d;
      cursor: not-allowed;
    }

    .btn.success {
      background-color: #28a745;
    }

    .server-selector {
      text-align: center;
      margin: 15px 0;
    }

    .server-buttons-container {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .server-btn {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 6px;
      background-color: #6c757d;
      color: white;
      font-size: 13px;
      cursor: pointer;
      text-align: center;
      transition: background-color 0.2s;
    }

    .server-btn.active {
      background-color: #28a745;
    }

    .server-btn:hover {
      opacity: 0.9;
    }

    .info {
      font-size: 13px;
      color: #666;
      margin: 10px 0;
      text-align: center;
    }

    .last-sync {
      font-size: 12px;
      color: #888;
      text-align: center;
      margin-top: 10px;
      line-height: 1.5;
    }

    .divider {
      height: 1px;
      background: #e0e0e0;
      margin: 15px 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🦎 Votilarus History</h1>
    <p>浏览器历史记录同步工具</p>
  </div>

  <div id="status" class="status info">正在加载...</div>

  <div class="server-selector">
    <div class="server-buttons-container">
      <button id="serverLocalhost" class="server-btn">LocalServer</button>
      <button id="serverLan" class="server-btn">LinuxServer</button>
    </div>
  </div>

  <div class="divider"></div>

  <button id="syncBtn" class="btn">⟳ 立即同步</button>
  <button id="viewHistoryBtn" class="btn">📋 查看历史记录</button>

  <div id="lastSync" class="last-sync"></div>

  <script src="popup.js"></script>
</body>
</html>
